set_dhw_mode:
  name: Set DHW mode
  description: Set domestic hot water mode via the Remocon cloud API.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry id when multiple integrations are configured.
      required: false
      selector:
        text:
    mode:
      name: Mode
      description: DHW mode value supported by your system (for many units 0..5).
      required: true
      selector:
        number:
          min: 0
          max: 5
          mode: box

set_dhw_temperature:
  name: Set DHW temperatures
  description: Set domestic hot water comfort and/or reduced temperature.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry id when multiple integrations are configured.
      required: false
      selector:
        text:
    comfort:
      name: Comfort
      description: Comfort setpoint in degC.
      required: false
      selector:
        number:
          min: 20
          max: 75
          step: 0.5
          mode: box
    reduced:
      name: Reduced
      description: Reduced setpoint in degC.
      required: false
      selector:
        number:
          min: 20
          max: 75
          step: 0.5
          mode: box

set_data_item:
  name: Set data item
  description: Write an arbitrary v2 data item id.
  fields:
    entry_id:
      name: Entry ID
      description: Config entry id when multiple integrations are configured.
      required: false
      selector:
        text:
    item_id:
      name: Item ID
      description: Data item id, for example ChFlowSetpointTemp.
      required: true
      selector:
        text:
    value:
      name: Value
      description: New value for the data item.
      required: true
      selector:
        text:
    zone:
      name: Zone
      description: Zone index for the item (default 0).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10
          mode: box
